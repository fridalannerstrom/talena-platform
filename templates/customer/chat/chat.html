{% extends "customer/core/layouts/customer_base.html" %}
{% block content %}
{% load static %}
{% csrf_token %}

<style>
  /* Container */
  #chat-messages{
    background: #f8f9fa;
  }

  /* Each message row */
  .chat-row{
    display: flex;
    margin-bottom: 10px;
  }
  .chat-row.user{
    justify-content: flex-end;
  }
  .chat-row.assistant{
    justify-content: flex-start;
  }

  /* Bubble */
  .chat-bubble{
    max-width: min(760px, 80%);
    padding: 10px 12px;
    border-radius: 14px;
    line-height: 1.45;
    font-size: 0.95rem;
    white-space: pre-wrap;        /* keep newlines */
    word-break: break-word;       /* long words/urls */
    box-shadow: 0 1px 1px rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.05);
  }

  /* Different styles */
  .chat-row.user .chat-bubble{
    background: #111827;          /* dark bubble */
    color: #fff;
    border-color: rgba(255,255,255,0.10);
  }

  .chat-row.assistant .chat-bubble{
    background: #ffffff;
    color: #111827;
  }

  /* Optional: little label line (time/role) */
  .chat-meta{
    font-size: 0.75rem;
    color: #6b7280;
    margin-top: 4px;
  }
  .chat-row.user .chat-meta{
    text-align: right;
  }

  /* Make the whole card feel premium */
  .chat-card{
    border-radius: 16px;
    overflow: hidden;
  }
  .chat-inputbar{
    background: #fff;
  }

  /* Input */
  #chat-input{
    border-radius: 999px;
    padding: 12px 14px;
  }
  #send-btn{
    border-radius: 999px;
    padding: 10px 16px;
  }

.chat-bubble.is-typing{
  opacity: 0.9;
}

  .chat-bubble p { margin: 0 0 0.6rem 0; }
  .chat-bubble p:last-child { margin-bottom: 0; }

  .chat-bubble ul, .chat-bubble ol {
    margin: 0.4rem 0 0.6rem 1.2rem;
    padding: 0;
  }

  .chat-bubble li { margin: 0.15rem 0; }

  .chat-bubble strong { font-weight: 700; }

  .chat-bubble code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-size: 0.9em;
    padding: 0.15em 0.35em;
    border-radius: 6px;
    background: rgba(17, 24, 39, 0.06);
  }

  .chat-bubble pre {
    margin: 0.6rem 0;
    padding: 0.75rem;
    border-radius: 12px;
    overflow-x: auto;
    background: rgba(17, 24, 39, 0.06);
  }

  .chat-bubble pre code {
    background: transparent;
    padding: 0;
  }

  .chat-bubble blockquote {
    margin: 0.6rem 0;
    padding-left: 0.75rem;
    border-left: 3px solid rgba(17, 24, 39, 0.15);
    color: rgba(17, 24, 39, 0.85);
  }

  .chat-bubble a {
    text-decoration: underline;
    word-break: break-word;
  }

</style>

<div class="container-fluid px-3 py-4">

    <h2 class="mb-4">AI Chat</h2>

    <div class="card chat-card" style="height:70vh; display:flex; flex-direction:column;">

        <!-- Message area -->
        <div id="chat-messages"
             class="p-3"
             style="flex:1; overflow-y:auto; background:#f8f9fa;">
        </div>

        <!-- Input area -->
        <div class="p-3 border-top d-flex gap-2 chat-inputbar">
            <input type="text"
                   id="chat-input"
                   class="form-control"
                   placeholder="Type your message...">
<button id="send-btn" class="btn btn-primary" type="button">Send</button>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script>
const messagesDiv = document.getElementById("chat-messages");
const input = document.getElementById("chat-input");
const button = document.getElementById("send-btn");

function getCsrfToken() {
  const el = document.querySelector("input[name=csrfmiddlewaretoken]");
  return el ? el.value : "";
}

function addMessage(role, text) {
  const row = document.createElement("div");
  row.className = `chat-row ${role}`;

  const bubble = document.createElement("div");
  bubble.className = "chat-bubble";

  // Store raw markdown for assistant; show as plain text during streaming
  bubble.dataset.raw = text || "";
  bubble.textContent = text || "";

  row.appendChild(bubble);
  messagesDiv.appendChild(row);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;

  return row;
}

function renderMarkdownInBubble(bubbleEl) {
  const raw = bubbleEl.dataset.raw || "";
  if (!raw.trim()) {
    bubbleEl.innerHTML = "";
    return;
  }

  // Markdown -> HTML
  const html = marked.parse(raw, { gfm: true, breaks: true });

  // Sanitize HTML to avoid XSS
  bubbleEl.innerHTML = DOMPurify.sanitize(html);
}

async function sendToBackendStream(message) {
  const res = await fetch("{% url 'ai_chat:chat_stream_api' %}", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": getCsrfToken(),
    },
    body: JSON.stringify({ message })
  });

  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.error || "Request failed");
  }

  if (!res.body) {
    throw new Error("Streaming not supported in this browser/response");
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder("utf-8");
  return { reader, decoder };
}

async function handleSend() {
  const text = input.value.trim();
  if (!text) return;

  button.disabled = true;
  input.disabled = true;

  // User message (plain text)
  addMessage("user", text);
  input.value = "";

  // Assistant bubble
  const assistantRow = addMessage("assistant", "");
  const assistantBubble = assistantRow.querySelector(".chat-bubble");
  assistantBubble.dataset.raw = "";
  assistantBubble.textContent = "";

  try {
    const { reader, decoder } = await sendToBackendStream(text);

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });

      // Accumulate raw markdown
      assistantBubble.dataset.raw += chunk;

      // Show live streaming as plain text (safe)
      assistantBubble.textContent += chunk;

      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // After stream finished: render markdown nicely
    renderMarkdownInBubble(assistantBubble);

  } catch (err) {
    const msg = "Error: " + (err?.message || "Unknown error");
    assistantBubble.dataset.raw = msg;
    assistantBubble.textContent = msg;
  } finally {
    button.disabled = false;
    input.disabled = false;
    input.focus();
  }
}

button.addEventListener("click", (e) => {
  e.preventDefault();
  handleSend();
});

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    handleSend();
  }
});
</script>
{% endblock %}
