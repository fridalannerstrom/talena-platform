{% extends "customer/core/layouts/customer_base.html" %}
{% block content %}
{% load static %}
{% csrf_token %}

<div class="container-fluid px-3 py-4">

    <h2 class="mb-4">AI Chat</h2>

    <div class="card" style="height:70vh; display:flex; flex-direction:column;">

        <!-- Message area -->
        <div id="chat-messages"
             class="p-3"
             style="flex:1; overflow-y:auto; background:#f8f9fa;">
        </div>

        <!-- Input area -->
        <div class="p-3 border-top d-flex gap-2">
            <input type="text"
                   id="chat-input"
                   class="form-control"
                   placeholder="Type your message...">
            <button id="send-btn" class="btn btn-primary">
                Send
            </button>
        </div>

    </div>

</div>

<script>
const messagesDiv = document.getElementById("chat-messages");
const input = document.getElementById("chat-input");
const button = document.getElementById("send-btn");

function addMessage(role, text) {
  const div = document.createElement("div");
  div.classList.add("mb-2");

  if (role === "user") {
    div.innerHTML = `<div class="text-end">
      <span class="">${escapeHtml(text)}</span>
    </div>`;
  } else {
    div.innerHTML = `<div>
      <span class="">${escapeHtml(text)}</span>
    </div>`;
  }

  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, (m) => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[m]));
}

function getCsrfToken() {
  // Django sätter en hidden input via {% csrf_token %}
  const el = document.querySelector("input[name=csrfmiddlewaretoken]");
  return el ? el.value : "";
}

async function sendToBackend(message) {
  const res = await fetch("{% url 'ai_chat:chat_api' %}", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": getCsrfToken(),
    },
    body: JSON.stringify({ message })
  });

  const data = await res.json();
  if (!res.ok) {
    throw new Error(data.error || "Request failed");
  }
  return data.answer;
}

button.addEventListener("click", async () => {
  const text = input.value.trim();
  if (!text) return;

  addMessage("user", text);
  input.value = "";

  // optional: visa "thinking"
  addMessage("assistant", "…");
  const lastAssistant = messagesDiv.lastElementChild;

  try {
    const answer = await sendToBackend(text);
    lastAssistant.querySelector("span").textContent = answer;
  } catch (err) {
    lastAssistant.querySelector("span").textContent = "Error: " + err.message;
  }
});

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") button.click();
});
</script>
{% endblock %}
